<!DOCTYPE html>

<html>

<head>

    <meta charset="UTF-8">
    <link rel = "stylesheet" href = "../style/style.css">
    <script src = "../script/register.js" defer> </script>

</head>

<body>

<div id="registrationPage">
    <h1> Create new account </h1>
    <div id = "createUsername">
        <input type="text" id="username" placeholder="Enter new username">
    </div>
    <div id = "createPassword">
        <input type="text" id="password" placeholder="Enter new password">
    </div>
    <div id = "confirmPassword">
        <input type="text" id="repeatedPassword" placeholder="Confirm password">
    </div>
    <div id = "createEmail">
        <input type="text" id="email" placeholder="Enter new email">
    </div>

    <button onclick="registerAccount()">Register account</button>

</div>


</body>
</html>
